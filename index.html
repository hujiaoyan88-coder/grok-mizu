<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🩵みずみず - 水トラッカー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .water-drop { animation: drip 2s infinite; }
    @keyframes drip { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    .progress-circle { transition: stroke-dashoffset 0.6s ease; }
    .calendar-day {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .has-heart::after {
      content: "🩵";
      position: absolute;
      bottom: 4px;
      font-size: 18px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-sky-50 min-h-screen pb-20">

  <div class="max-w-md w-full mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">

    <!-- ヘッダー -->
    <div class="bg-pink-500 text-white p-6 text-center">
      <div class="flex justify-center mb-2">
        <span class="text-6xl water-drop">💧</span>
      </div>
      <h1 class="text-3xl font-bold">みずみず</h1>
      <p class="text-pink-100">今日もきれいに、みずみずしく</p>
    </div>

    <div class="p-6 space-y-10">

      <!-- 今日の進捗 -->
      <div class="text-center">
        <div class="relative w-52 h-52 mx-auto">
          <svg class="w-full h-full -rotate-90" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="52" fill="none" stroke="#f3e8ff" stroke-width="14"/>
            <circle id="progress" cx="60" cy="60" r="52" fill="none" 
                    stroke="#67e8f9" stroke-width="14" stroke-dasharray="326.73"
                    stroke-dashoffset="326.73" stroke-linecap="round"/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <span id="cups" class="text-7xl font-bold text-pink-600">0</span>
            <span class="text-sm text-gray-500 -mt-3">/ 8杯</span>
            <span id="ml" class="text-2xl font-medium text-cyan-600">0 ml</span>
          </div>
        </div>
      </div>

      <!-- 追加ボタン -->
      <div class="grid grid-cols-2 gap-4">
        <button onclick="addWater(1)" 
                class="bg-cyan-100 active:bg-cyan-200 py-7 rounded-3xl text-2xl font-medium transition">
          +1杯
        </button>
        <button onclick="addWater(2)" 
                class="bg-pink-100 active:bg-pink-200 py-7 rounded-3xl text-2xl font-medium transition">
          +2杯
        </button>
      </div>

      <!-- カレンダー -->
      <div>
        <div class="flex justify-between items-center mb-4">
          <button onclick="prevMonth()" class="text-2xl px-3">‹</button>
          <h2 id="monthTitle" class="font-semibold text-xl text-pink-600"></h2>
          <button onclick="nextMonth()" class="text-2xl px-3">›</button>
        </div>
        
        <div class="grid grid-cols-7 gap-1 text-center text-xs font-medium text-gray-400 mb-2">
          <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
        </div>
        
        <div id="calendar" class="grid grid-cols-7 gap-1 text-sm"></div>
      </div>
    </div>
  </div>

  <script>
    let currentDate = new Date();
    let records = {}; // { "2026-07-14": 7, ... }

    // localStorageから読み込み
    function loadRecords() {
      const saved = localStorage.getItem('mizumizuRecords');
      if (saved) records = JSON.parse(saved);
    }

    function saveRecords() {
      localStorage.setItem('mizumizuRecords', JSON.stringify(records));
    }

    function getTodayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function addWater(num) {
      const today = getTodayKey();
      records[today] = (records[today] || 0) + num;
      if (records[today] > 12) records[today] = 12; // 最大12杯まで
      saveRecords();
      updateTodayUI();
      renderCalendar();
    }

    function updateTodayUI() {
      const today = getTodayKey();
      const cups = records[today] || 0;
      document.getElementById('cups').textContent = cups;
      document.getElementById('ml').textContent = (cups * 250) + " ml";

      const progress = document.getElementById('progress');
      const percent = Math.min(cups / 8, 1);
      progress.style.strokeDashoffset = 326.73 * (1 - percent);
    }

    // カレンダー描画
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      document.getElementById('monthTitle').textContent = 
        `${year}年 ${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const calendar = document.getElementById('calendar');
      calendar.innerHTML = '';

      // 空白
      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = "calendar-day";
        calendar.appendChild(empty);
      }

      // 日付
      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const cups = records[dateKey] || 0;
        
        const dayEl = document.createElement('div');
        dayEl.className = `calendar-day text-gray-700 rounded-xl hover:bg-pink-50 transition cursor-pointer ${cups >= 6 ? 'has-heart' : ''}`;
        dayEl.innerHTML = `<span class="font-medium">${day}</span>`;
        
        // 今日の日付強調
        if (dateKey === getTodayKey()) {
          dayEl.classList.add('bg-pink-100', 'font-bold');
        }
        
        dayEl.onclick = () => showDayDetail(dateKey, cups);
        calendar.appendChild(dayEl);
      }
    }

    function showDayDetail(dateKey, cups) {
      const ml = cups * 250;
      const status = cups >= 6 ? "🩵 1.5L達成！おめでとう♡" : "まだまだ！";
      alert(`${dateKey}\n\n${cups}杯 (${ml}ml)\n${status}`);
    }

    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }

    // 初期化
    loadRecords();
    updateTodayUI();
    renderCalendar();
  </script>
</body>
</html>
